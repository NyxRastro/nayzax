<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تريلر — لسان اليمن (الهمداني) — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .story-page {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .story-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .story-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.93) 0%,
                    rgba(15, 7, 38, 0.88) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        /* Animated stars overlay */
        .story-stars {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .s-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: sTwinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes sTwinkle {

            0%,
            100% {
                opacity: var(--op, 0.6);
            }

            50% {
                opacity: 0.1;
            }
        }

        /* Subtle center glow */
        .story-nebula-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(192, 132, 252, 0.05) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== CONTENT WRAPPER ===== */
        .trailer-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 110px; /* Increased desktop space */
            padding-bottom: 40px;
            box-sizing: border-box;
        }

        .trailer-container {
            width: 100%;
            max-width: 1200px;
            /* matches width of the big card and text block */
            display: flex;
            flex-direction: column;
            align-items: center;
            /* stretch to fill max-width */
            padding: 0 40px;
            gap: 40px;
        }

        /* ===== WIDE HERO CARD ===== */
        .trailer-card {
            position: relative;
            background: rgba(123, 77, 255, 0.1); 
            border-radius: 24px;
            width: 100%;
            height: 220px;
            box-shadow: 0 10px 10px rgba(123, 77, 255, 0.25);
            /* subtle float */
            animation: float 6s ease-in-out infinite;
            cursor: pointer;
            /* Removed overflow hidden to prevent clipping the play icon */
        }

        .trailer-card.disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        .trailer-card.disabled::before {
            content: 'قريباً';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: #8B4513; /* Brown color */
            z-index: 5;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }





        /* ===== TEXT BLOCK (Below Card) ===== */
        .trailer-text {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            /* Keep children taking full width for centering/alignment */
            gap: 20px;
        }

        .trailer-title {
            font-family: 'Cairo', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #9C71D9;
            /* Matching muted purple title from screenshot */
            text-shadow: 0 0 15px rgba(156, 113, 217, 0.4);
            margin: 0;
            text-align: right;
        }

        .trailer-desc {
            font-family: 'Cairo', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            margin: 0;
            text-align: right;
            /* text aligned to right internally */
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            /* Optional: if you want fully justified block like some design mockups */
            /* text-align: justify; */
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .trailer-card {
                height: 300px;
            }

            .trailer-title {
                font-size: 2rem;
                text-align: center;
            }

            .trailer-desc {
                text-align: center;
            }
        }

        @media (max-width: 600px) {
            html, body {
                overflow-y: auto; /* Allow scrolling */
                height: auto;
            }

            .trailer-content {
                min-height: 100vh;
                padding-top: 150px; /* Even more space for mobile header */
                padding-bottom: 40px;
                justify-content: flex-start;
            }

            .trailer-container {
                padding: 0 20px;
                gap: 24px;
            }

            .trailer-card {
                height: 140px; /* Smaller card */
                border-radius: 18px;
            }





            .trailer-title {
                font-size: 1.6rem;
                text-align: center;
            }

            .trailer-desc {
                font-size: 0.95rem;
                text-align: center;
                line-height: 1.6;
                display: block; /* Show full text */
                overflow: visible;
            }

            .nav-links {
                display: none;
            }
        }

        /* Video Modal Styles */
        .video-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 4, 25, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .video-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .video-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .video-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10001;
            transition: all 0.2s ease;
        }

        .video-close:hover {
            transform: scale(1.1);
            color: #D98BFF;
        }
    </style>
</head>

<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="story-page">
        <div class="story-bg"></div>
        <div class="story-nebula-glow"></div>
        <div class="story-stars" id="story-stars"></div>
    </div>

    <app-header></app-header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="trailer-content">
        <div class="trailer-container">

            <!-- Wide Card Setup -->
            <div class="trailer-card" id="trailer-card" style="background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;">
            </div>

            <!-- Text Content -->
            <div class="trailer-text">
                <h1 class="trailer-title" id="dynamic-title">...</h1>
                <p class="trailer-desc" id="dynamic-desc">
                    <!-- description will load here -->
                </p>
            </div>

        </div>
    </main>

    <!-- ===== VIDEO MODAL (Bigger Window) ===== -->
    <div class="video-modal" id="video-modal">
        <button class="video-close" id="video-close"><i class="fa-solid fa-times"></i></button>
        <div class="video-wrapper">
            <video id="trailer-video-player" controls>
                <source src="" type="video/mp4" id="trailer-video-source">
                متصفحك لا يدعم تشغيل الفيديو.
            </video>
        </div>
    </div>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // ===== DYNAMIC MOVIE LOGIC =====
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            if(!movieId) return;

            try {
                const res = await fetch(`/api/movies/${movieId}`);
                if(!res.ok) throw new Error();
                const movie = await res.json();
                
                document.getElementById('dynamic-title').textContent = movie.title;
                document.title = 'تريلر — ' + movie.title + ' — نيزك';
                
                if (movie.description) {
                    document.getElementById('dynamic-desc').textContent = movie.description;
                }
                
                if(movie.thumbnail) {
                    document.getElementById('trailer-card').style.backgroundImage = `url('${movie.thumbnail}')`;
                }

                // Setup Video Modal
                const videoModal = document.getElementById('video-modal');
                const videoPlayer = document.getElementById('trailer-video-player');
                const videoSource = document.getElementById('trailer-video-source');
                const closeBtn = document.getElementById('video-close');
                const triggerCard = document.getElementById('trailer-card');

                if(movie.trailer_file) {
                    videoSource.src = movie.trailer_file;
                    videoPlayer.load();

                    triggerCard.onclick = () => {
                        videoModal.classList.add('active');
                        videoPlayer.play();
                    };
                } else {
                    triggerCard.classList.add('disabled');
                }

                closeBtn.onclick = () => {
                    videoModal.classList.remove('active');
                    videoPlayer.pause();
                };

            } catch (err) {
                console.error('Error loading movie trailer:', err);
            }
        });

        // ===== STAR PARTICLES =====
        const starsLayer = document.getElementById('story-stars');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 's-star';
            const size = 1 + Math.random() * 2.5;
            s.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                --dur: ${2 + Math.random() * 5}s;
                --op: ${0.2 + Math.random() * 0.7};
                opacity: var(--op);
                animation-delay: ${Math.random() * 5}s;
            `;
            starsLayer.appendChild(s);
        }
    </script>
</body>
</html>
