<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قارئ نيزك | نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== READER LAYOUT ===== */
        .reader-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        /* Header Bar */
        .reader-header {
            height: 70px;
            background: rgba(15, 8, 35, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(192, 132, 252, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #C084FC;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(192, 132, 252, 0.3);
            padding: 8px 18px;
            border-radius: 12px;
            background: rgba(192, 132, 252, 0.05);
        }

        .back-btn:hover {
            background: rgba(192, 132, 252, 0.15);
            transform: translateX(4px); /* RTL: moves left */
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.2);
        }
        
        [dir="rtl"] .back-btn:hover { transform: translateX(4px); }
        [dir="ltr"] .back-btn:hover { transform: translateX(-4px); }

        .magazine-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 40%;
            text-align: center;
        }

        .reader-actions {
            display: flex;
            gap: 15px;
        }

        .action-btn {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .action-btn:hover {
            background: rgba(192, 132, 252, 0.2);
            border-color: #C084FC;
            color: #C084FC;
        }

        /* PDF Viewer Area */
        .pdf-viewer-wrap {
            flex: 1;
            width: 100%;
            background: #1a152e;
            position: relative;
            overflow: hidden;
        }

        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(0.1); /* Subtle premium effect */
        }

        /* Loading UI */
        .reader-loader {
            position: absolute;
            inset: 0;
            background: #0F0823;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(192, 132, 252, 0.1);
            border-top: 4px solid #C084FC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .loader-text {
            color: #C084FC;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .magazine-title {
                display: none;
            }
            .reader-header {
                padding: 0 15px;
            }
            .reader-actions { gap: 8px; }
        }
    </style>
</head>

<body>

    <div class="reader-container">
        <!-- HEADER -->
        <header class="reader-header">
            <div class="back-btn" id="btn-back">
                <i class="fa-solid fa-arrow-right"></i>
                <span>العودة للمجلة</span>
            </div>

            <h1 class="magazine-title" id="pdf-title">جاري تحميل العدد...</h1>

            <div class="reader-actions">
                <button class="action-btn" title="كامل الشاشة" onclick="toggleFullScreen()">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button class="action-btn" title="تحميل الملف" id="btn-download">
                    <i class="fa-solid fa-download"></i>
                </button>
            </div>
        </header>

        <!-- VIEWER -->
        <div class="pdf-viewer-wrap">
            <div class="reader-loader" id="loader">
                <div class="loader-spinner"></div>
                <div class="loader-text">جاري تحضير العدد...</div>
            </div>
            <iframe id="pdf-frame" src="" title="PDF Viewer"></iframe>
        </div>
    </div>

    <script src="js/header.js"></script>
    <script>
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const pdfUrl = params.get('pdf');
        const pdfTitle = params.get('title');

        const frame = document.getElementById('pdf-frame');
        const titleEl = document.getElementById('pdf-title');
        const loader = document.getElementById('loader');
        const backBtn = document.getElementById('btn-back');
        const downloadBtn = document.getElementById('btn-download');

        if (pdfTitle) titleEl.textContent = decodeURIComponent(pdfTitle);

        if (pdfUrl) {
            // Use the PDF url directly, browsers handled it well
            // We append #toolbar=1 to show controls or #toolbar=0 to hide
            const cleanUrl = decodeURIComponent(pdfUrl);
            frame.src = cleanUrl + "#toolbar=1";
            
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = cleanUrl;
                link.download = pdfTitle ? pdfTitle + ".pdf" : "magazine.pdf";
                link.click();
            };

            frame.addEventListener('load', () => {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    loader.style.visibility = 'hidden';
                }, 800);
            });
        } else {
            titleEl.textContent = "خطأ: الملف غير موجود";
            loader.innerHTML = `<div style="color:#EF4444; font-weight:700;">تعذّر العثور على رابط الملف</div>`;
        }

        // Return logic
        backBtn.onclick = () => {
            if (window.navigateTo) {
                window.navigateTo('magazine.html');
            } else {
                window.location.href = 'magazine.html';
            }
        };

        // Fullscreen toggle
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Handle escape to close fullscreen logic if needed
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // If we want custom behavior
            }
        });

    </script>
</body>

</html>
