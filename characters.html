<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الشخصيات — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .page-bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.95) 0%,
                    rgba(15, 7, 38, 0.90) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        .stars-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--op, 0.6); }
            50% { opacity: 0.1; }
        }

        /* ===== CONTENT WRAPPER ===== */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
        }

        /* ===== HORIZONTAL CAROUSEL ===== */
        .slider-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            height: 450px;
            user-select: none;
        }

        .cards-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Base Card Styling */
        .char-card-container {
            position: relative;
            border-radius: 20px;
            flex-shrink: 0;
            cursor: pointer;
            overflow: hidden;
            background: linear-gradient(145deg, #1e0b4a 0%, #0c0420 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-size: cover;
            background-position: center;
        }

        /* Slots Logic (Landscape) */
        .char-card-container.active {
            width: 580px;
            height: 360px;
            z-index: 10;
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.6);
        }

        .char-card-container.side {
            width: 240px;
            height: 150px;
            opacity: 0.7;
            z-index: 5;
            transform: scale(0.9);
            filter: blur(0.5px);
        }

        .char-card-container.far-side {
            width: 180px;
            height: 112px;
            opacity: 0.35;
            z-index: 2;
            transform: scale(0.8);
            filter: blur(1.5px);
        }

        .char-card-container:hover {
            opacity: 1;
            filter: blur(0);
            transform: translateY(-5px) scale(0.95);
        }
        .char-card-container.active:hover {
            transform: translateY(-8px) scale(1.02);
        }

        /* Animated Bobbing for active */
        .char-card-container.active {
            animation: bobIt 4s ease-in-out infinite;
        }

        @keyframes bobIt {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Navigation Arrows (Story Style) */
        .nav-btn {
            position: absolute;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-shape {
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .btn-prev .arrow-shape {
            border-width: 15px 0 15px 22px;
            border-color: transparent transparent transparent #C084FC;
        }

        .btn-next .arrow-shape {
            border-width: 15px 22px 15px 0;
            border-color: transparent #C084FC transparent transparent;
        }

        .nav-btn:hover .arrow-shape {
            opacity: 1;
            filter: drop-shadow(0 0 10px #C084FC);
        }

        .btn-prev { right: 30px; }
        .btn-next { left: 30px; }

        /* Pagination dots */
        .carousel-dots {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .dot-diamond {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            cursor: pointer;
            transition: 0.3s;
            border-radius: 1px;
        }

        .dot-diamond.active {
            background: #a855f7;
            box-shadow: 0 0 12px #a855f7;
            transform: rotate(45deg) scale(1.4);
        }

        /* Mobile Tweaks */
        @media (max-width: 768px) {
            .content-wrapper { justify-content: flex-start; padding-top: 140px; }
            .char-card-container.active { width: 92vw; height: 58vw; }
            .char-card-container.side { display: none; }
            .char-card-container.far-side { display: none; }
            .nav-btn { display: none; }
            .slider-wrapper { height: 280px; }
            .carousel-dots { margin-top: 60px; }
        }
    </style>
</head>

<body>

    <div class="page-bg-container">
        <div class="page-bg"></div>
        <div class="stars-overlay" id="stars-container"></div>
    </div>

    <!-- NavBar -->
    <app-header></app-header>

    <main class="content-wrapper">
        <div class="slider-wrapper">
            <button class="nav-btn btn-next" id="c-next" aria-label="التالي">
                <span class="arrow-shape"></span>
            </button>
            <div class="cards-track" id="carousel-track">
                <!-- Data-driven injection -->
            </div>
            <button class="nav-btn btn-prev" id="c-prev" aria-label="السابق">
                <span class="arrow-shape"></span>
            </button>
        </div>

        <div class="carousel-dots" id="carousel-dots"></div>
    </main>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Stars
        const starsBox = document.getElementById('stars-container');
        for (let i = 0; i < 70; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = 1 + Math.random() * 2;
            star.style.cssText = `left: ${Math.random() * 100}%; top: ${Math.random() * 100}%; width: ${size}px; height: ${size}px; --dur: ${2 + Math.random() * 3}s; --op: ${0.4 + Math.random() * 0.5};`;
            starsBox.appendChild(star);
        }

        // Data
        let chars = [];
        let cur = 0;
        const TOTAL_SLOTS = 5;

        function render() {
            const track = document.getElementById('carousel-track');
            const dots = document.getElementById('carousel-dots');
            track.innerHTML = '';
            dots.innerHTML = '';

            if (chars.length === 0) {
                track.innerHTML = '<div style="color:rgba(255,255,255,0.6); font-size:1.2rem;">لا توجد شخصيات مضافة لهذا الفيلم</div>';
                return;
            }

            const n = chars.length;
            // 5-slot logic (Center focus)
            const slots = [
                (cur - 2 + n) % n,
                (cur - 1 + n) % n,
                cur,
                (cur + 1) % n,
                (cur + 2) % n
            ];

            slots.forEach((idx, pos) => {
                const char = chars[idx];
                const card = document.createElement('div');
                const isActive = pos === 2;
                const isSide = pos === 1 || pos === 3;
                
                let sizeClass = isActive ? 'active' : (isSide ? 'side' : 'far-side');
                card.className = `char-card-container ${sizeClass}`;
                
                if (char.image) {
                    card.style.backgroundImage = `url('${char.image}')`;
                }

                card.onclick = () => {
                    if (!isActive) {
                        cur = idx;
                        render();
                    }
                };

                track.appendChild(card);
            });

            // Dots
            chars.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = `dot-diamond ${i === cur ? 'active' : ''}`;
                d.onclick = () => { cur = i; render(); };
                dots.appendChild(d);
            });
        }

        function movePrev() {
            if (chars.length === 0) return;
            cur = (cur - 1 + chars.length) % chars.length;
            render();
        }

        function moveNext() {
            if (chars.length === 0) return;
            cur = (cur + 1) % chars.length;
            render();
        }

        document.getElementById('c-prev').onclick = movePrev;
        document.getElementById('c-next').onclick = moveNext;

        // Swipe & Keys
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') movePrev();
            if (e.key === 'ArrowLeft') moveNext();
        });

        let touchStartX = 0;
        let touchEndX = 0;
        const track = document.getElementById('carousel-track');
        track.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        track.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) movePrev();
                else moveNext();
            }
        }, {passive: true});

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            if(!movieId) return;

            fetch(`/api/movies/${movieId}`).then(r=>r.json()).then(m=>{
                document.title = 'الشخصيات — ' + m.title + ' — نيزك';
            }).catch(e=>e);

            try {
                const res = await fetch(`/api/movies/${movieId}/characters`);
                chars = await res.json();
                render();
            } catch(e) {
                console.error('Error fetching characters', e);
                chars = [];
                render();
            }
        });
    </script>
</body>

</html>
