<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الشخصيات — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .page-bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.95) 0%,
                    rgba(15, 7, 38, 0.90) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        .stars-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: var(--op, 0.6);
            }

            50% {
                opacity: 0.1;
            }
        }

        /* ===== CONTENT WRAPPER ===== */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
        }

        /* ===== CAROUSEL CONTAINER (Even smaller) ===== */
        .characters-carousel {
            position: relative;
            width: 100%;
            max-width: 900px;
            /* Reduced further */
            height: 380px;
            /* Reduced further */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-track {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Base Card Styling */
        .char-card-container {
            position: absolute;
            width: 180px;
            /* Reduced further */
            height: 180px;
            /* Reduced further */
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            z-index: 1;
        }

        .char-card-base {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(145deg, #1e0b4a 0%, #0c0420 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.7s ease;
            overflow: hidden;
        }

        .char-illustration {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            height: 160px;
            /* Reduced further */
            object-fit: contain;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            filter: grayscale(0.2) brightness(0.8);
            pointer-events: none;
        }

        /* Description Container */
        .char-desc {
            position: absolute;
            bottom: 20px;
            width: 85%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            transform: translateY(10px);
            z-index: 5;
        }

        .char-desc .char-name {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 3px;
            color: #d8b4fe;
        }

        .char-desc p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0;
        }

        /* ====== ACTIVE STATE (CENTER) ====== */
        .char-card-container.active {
            width: 260px;
            height: 240px;
            z-index: 10;
            transform: translateX(0) translateY(0);
            cursor: default;
        }

        .char-card-container.active .char-card-base {
            background: linear-gradient(145deg, #2a0e66 0%, #110530 100%);
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 20px 50px rgba(168, 85, 247, 0.3);
            overflow: visible;
        }

        .char-card-container.active .char-illustration {
            height: 310px;
            bottom: 100px;
            filter: grayscale(0) brightness(1) drop-shadow(0 15px 30px rgba(0, 0, 0, 0.8));
            transform: translateX(-50%) scale(1.1);
            z-index: 15;
            animation: bobIt 4s ease-in-out infinite;
        }

        .char-card-container.active .char-desc {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.3s;
        }

        /* ====== SIDE STATES (RTL) ====== */
        .char-card-container.prev {
            transform: translateX(240px) scale(0.7);
            opacity: 0.5;
        }

        .char-card-container.next {
            transform: translateX(-240px) scale(0.7);
            opacity: 0.5;
        }

        /* Hidden/Far states */
        .char-card-container.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(0) scale(0.5);
        }

        .char-card-container.far-prev {
            transform: translateX(450px) scale(0.6);
            opacity: 0.2;
        }

        .char-card-container.far-next {
            transform: translateX(-450px) scale(0.6);
            opacity: 0.2;
        }

        @keyframes bobIt {

            0%,
            100% {
                transform: translateX(-50%) scale(1.1) translateY(0);
            }

            50% {
                transform: translateX(-50%) scale(1.1) translateY(-8px);
            }
        }

        /* Pagination dots */
        .carousel-dots {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .dot-diamond {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            cursor: pointer;
            transition: 0.3s;
        }

        .dot-diamond.active {
            background: #a855f7;
            box-shadow: 0 0 10px #a855f7;
            transform: rotate(45deg) scale(1.3);
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            background: none;
            padding: 30px;
            border: none;
            font-size: 2.2rem;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.3s;
            z-index: 30;
            user-select: none;
        }

        .nav-btn:hover {
            color: #a855f7;
            transform: scale(1.1);
        }

        .btn-prev {
            right: 20px;

        }

        /* Visually right, logically Previous (Right pointing arrow) */
        .btn-next {

            left: 20px;
        }

        /* Visually left, logically Next (Left pointing arrow) */
    </style>
</head>

<body>

    <div class="page-bg-container">
        <div class="page-bg"></div>
        <div class="stars-overlay" id="stars-container"></div>
    </div>

    <!-- NavBar -->
    <app-header></app-header>

    <main class="content-wrapper">
        <button class="nav-btn btn-next" id="c-next">&#10095;</button>
        <button class="nav-btn btn-prev" id="c-prev">&#10094;</button>


        <div class="characters-carousel">
            <div class="carousel-track" id="carousel-track">
                <!-- Data-driven injection -->
            </div>
        </div>

        <div class="carousel-dots" id="carousel-dots"></div>
    </main>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Stars
        const starsBox = document.getElementById('stars-container');
        for (let i = 0; i < 70; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = 1 + Math.random() * 2;
            star.style.cssText = `left: ${Math.random() * 100}%; top: ${Math.random() * 100}%; width: ${size}px; height: ${size}px; --dur: ${2 + Math.random() * 3}s; --op: ${0.4 + Math.random() * 0.5};`;
            starsBox.appendChild(star);
        }

        // Data
        const chars = [
            { name: 'إيتاشي', desc: 'شخصية غامضة وقوية تمتلك قدرات بصرية استثنائية.', img: 'images/itachi.png' },
            { name: 'سالي', desc: 'المستكشفة الشجاعة التي تتحدى أسرار الفضاء المجهول.', img: 'images/itachi.png' },
            { name: 'زيد', desc: 'عبقري التكنولوجيا الذي يبتكر حلولاً لمخاطر المجرة.', img: 'images/itachi.png' },
            { name: 'نور', desc: 'الروح الهادئة التي تقود الفريق عبر العواصف النيزكية.', img: 'images/itachi.png' }
        ];

        let cur = 1;

        function render() {
            const track = document.getElementById('carousel-track');
            const dots = document.getElementById('carousel-dots');
            track.innerHTML = '';
            dots.innerHTML = '';

            chars.forEach((c, i) => {
                let state = 'hidden';
                let dist = i - cur;
                if (dist === 0) state = 'active';
                else if (dist === -1) state = 'prev';
                else if (dist === 1) state = 'next';
                else if (dist === -2) state = 'far-prev';
                else if (dist === 2) state = 'far-next';

                const card = document.createElement('div');
                card.className = `char-card-container ${state}`;
                card.onclick = () => { cur = i; render(); };

                card.innerHTML = `
                    <div class="char-card-base">
                        <img src="${c.img}" class="char-illustration" alt="${c.name}">
                    </div>
                    <div class="char-desc">
                        <div class="char-name">${c.name}</div>
                        <p>${c.desc}</p>
                    </div>
                `;
                track.appendChild(card);

                const d = document.createElement('div');
                d.className = `dot-diamond ${i === cur ? 'active' : ''}`;
                d.onclick = () => { cur = i; render(); };
                dots.appendChild(d);
            });
        }

        document.getElementById('c-prev').onclick = () => { if (cur > 0) { cur--; render(); } };
        document.getElementById('c-next').onclick = () => { if (cur < chars.length - 1) { cur++; render(); } };

        render();
    </script>
</body>

</html>
