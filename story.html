<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>القصص المسموعة — نيزك</title>
    <meta name="description" content="استمع إلى قصص نيزك المسموعة — مغامرات صوتية مثيرة للأطفال" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* Navbar will natively be transparent now */
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .story-page {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .story-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            /* change if needed */
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .story-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.93) 0%,
                    rgba(15, 7, 38, 0.88) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        /* Animated stars overlay */
        .story-stars {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .s-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: sTwinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes sTwinkle {

            0%,
            100% {
                opacity: var(--op, 0.6);
            }

            50% {
                opacity: 0.1;
            }
        }

        /* Subtle center glow */
        .story-nebula-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 760px;
            height: 420px;
            background: radial-gradient(ellipse, rgba(192, 132, 252, 0.06) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== CONTENT WRAPPER ===== */
        .story-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 78px;
            /* space for navbar */
            box-sizing: border-box;
        }

        /* ===== CARD SLIDER AREA ===== */
        .slider-wrapper {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Arrow buttons — solid triangle chevrons like screenshot */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 44px;
            height: 44px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .slider-arrow .arrow-shape {
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            transition: filter 0.25s ease, opacity 0.25s ease;
            opacity: 0.75;
        }

        .arrow-left .arrow-shape {
            border-width: 12px 18px 12px 0;
            border-color: transparent #C084FC transparent transparent;
        }

        .arrow-right .arrow-shape {
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent #C084FC;
        }

        .slider-arrow:hover .arrow-shape {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(192, 132, 252, 0.9));
        }

        .slider-arrow.arrow-right {
            right: 28px;
        }

        .slider-arrow.arrow-left {
            left: 28px;
        }

        /* ===== CARDS CONTAINER ===== */
        .cards-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 90px;
            /* wider spacing like the screenshot */
            position: relative;
        }

        /* ===== INDIVIDUAL CARD — MATCH PHOTO ===== */
        .story-card {
            /* soft neon purple gradient by default */
            background: linear-gradient(135deg, #D89BFF 0%, #9B67D7 55%, #7B4DBD 100%);
            border-radius: 26px;
            flex-shrink: 0;
            cursor: pointer;
            overflow: visible; /* ensure play icon can hang off */

            /* subtle depth */
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.10);

            transition:
                transform .45s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow .35s ease,
                opacity .35s ease;
        }

        .story-card.active {
            width: 300px;
            height: 300px;
            opacity: 1;
            z-index: 5;
        }

        .story-card.side {
            width: 220px;
            height: 220px;
            opacity: .85;
            z-index: 3;
        }

        .story-card:hover {
            transform: translateY(-8px) scale(1.05);
            opacity: 1;
            box-shadow:
                0 22px 70px rgba(192, 132, 252, 0.40),
                0 10px 30px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }



        /* tiny inner border highlight */
        .story-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 26px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        /* photo cards have no text */
        .card-inner {
            display: none;
        }

        /* Paginaion diamonds... */

        /* ===== PAGINATION DIAMONDS ===== */
        .slider-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-top: 0;
            z-index: 20;
        }

        .dot {
            width: 7px;
            height: 7px;
            border: 0;
            padding: 0;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(45deg);
            border-radius: 1.5px;
            cursor: pointer;
            transition: transform .2s ease, background .2s ease, box-shadow .2s ease, opacity .2s ease;
            opacity: .75;
        }

        .dot.active {
            background: #C084FC;
            transform: rotate(45deg) scale(1.4);
            box-shadow: 0 0 10px rgba(192, 132, 252, 0.8);
        }

        /* === DIRECTIONAL SLIDE ANIMATIONS === */
        @keyframes slideFromRight {
            from { opacity: 0; transform: translateX(120px) scale(0.85); }
            to   { opacity: 1; transform: translateX(0)     scale(1);    }
        }
        @keyframes slideFromLeft {
            from { opacity: 0; transform: translateX(-120px) scale(0.85); }
            to   { opacity: 1; transform: translateX(0)      scale(1);    }
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: scale(0.85) translateY(16px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);    }
        }

        /* Responsive tweaks */
        @media (max-width: 900px) {
            .cards-track {
                gap: 44px;
            }

            .story-card.active {
                width: 260px;
                height: 260px;
            }

            .story-card.side {
                width: 200px;
                height: 200px;
            }
        }

        @media (max-width: 620px) {
            .story-content {
                padding-top: 0;
            }

            .nav-links {
                display: none;
            }

            .cards-track {
                gap: 10px;
            }

            .story-card.active {
                width: 170px;
                height: 170px;
            }

            .story-card.side {
                width: 100px;
                height: 100px;
                opacity: 0.45;
            }

            /* Move cards a bit above center */
            .slider-wrapper {
                height: auto;
                min-height: 200px;
                top: 42%;
            }

            /* Dots — full-width centering, higher and more visible */
            .slider-dots {
                left: 0;
                right: 0;
                width: 100%;
                bottom: 125px;
                transform: none;
                z-index: 2000;
                display: flex;
                justify-content: center;
                gap: 15px;
                pointer-events: auto;
            }

            .dot {
                display: block;
                width: 9px;
                height: 9px;
                background: #FFFFFF !important;
                opacity: 1 !important;
                box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            }
            
            .dot.active {
                background: #D89BFF !important;
                transform: rotate(45deg) scale(1.4);
                box-shadow: 0 0 12px rgba(216, 155, 255, 1);
            }

            .slider-arrow {
                display: none !important;
            }
        }


        .audio-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .audio-modal-content {
            position: relative;
            width: 90%;
            max-width: 450px;
            aspect-ratio: 1;
            background: rgba(26, 15, 46, 0.4);
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .audio-modal-overlay.active .audio-modal-content {
            transform: scale(1) translateY(0);
        }

        .audio-cover-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.4;
            filter: blur(8px);
            z-index: 0;
            transition: background-image 0.3s ease;
        }
        
        .audio-cover-img {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .audio-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .audio-modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .audio-controls-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(0deg, rgba(8,3,20,0.95) 0%, rgba(8,3,20,0.3) 100%);
        }

        .audio-title-display {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            margin-bottom: 40px;
            text-align: center;
            width: 85%;
        }

        .audio-play-toggle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D89BFF, #7B4DBD);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(192, 132, 252, 0.5);
            transition: all 0.2s ease;
        }

        .audio-play-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(192, 132, 252, 0.8);
        }

        .audio-icon-shape {
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 14px 0 14px 22px;
            border-color: transparent transparent transparent #fff;
            margin-left: 6px;
            transition: all 0.2s ease;
        }

        .audio-play-toggle.playing .audio-icon-shape {
            border-style: double;
            border-width: 0 0 0 20px;
            border-color: #fff;
            height: 24px;
            margin-left: 0;
        }
    </style>
</head>

<body>
    <!-- ===== BACKGROUND ===== -->
    <div class="story-page">
        <div class="story-bg"></div>
        <div class="story-nebula-glow"></div>
        <div class="story-stars" id="story-stars"></div>
    </div>

    <app-header></app-header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="story-content">
        <!-- Slider -->
        <div class="slider-wrapper" aria-roledescription="carousel">
            <!-- Left arrow (◄) -->
            <button class="slider-arrow arrow-left" id="arrow-left" aria-label="السابق">
                <span class="arrow-shape"></span>
            </button>

            <!-- Track -->
            <div class="cards-track" id="cards-track">
                <!-- Cards injected by JS -->
            </div>

            <!-- Right arrow (►) -->
            <button class="slider-arrow arrow-right" id="arrow-right" aria-label="التالي">
                <span class="arrow-shape"></span>
            </button>
        </div>
        <!-- Pagination dots -->
        <div class="slider-dots" id="slider-dots" aria-label="مؤشرات التنقل"></div>
    </main>


    <script>
        // ===== STAR PARTICLES =====
        const starsLayer = document.getElementById('story-stars');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 's-star';
            const size = 1 + Math.random() * 2.5;
            s.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        --dur: ${2 + Math.random() * 5}s;
        --op: ${0.2 + Math.random() * 0.7};
        opacity: var(--op);
        animation-delay: ${Math.random() * 5}s;
      `;
            starsLayer.appendChild(s);
        }

        // ===== STORIES DATA =====
        let stories = [];
        let currentIndex = 0;
        let navDir = 0; // -1 = back, +1 = forward

        const TOTAL_SLOTS = 5; // Fixed number of slots/dots always visible

        const track = document.getElementById('cards-track');
        const dotsContainer = document.getElementById('slider-dots');

        async function initStories() {
            try {
                const res  = await fetch('/api/stories');
                const data = await res.json();
                stories = data || [];
                currentIndex = 0;
                renderSlider();
            } catch (err) {
                console.error(err);
                renderSlider();
            }
        }

        // Returns the story for a given slot index, or null if slot is empty
        function storyAt(slotIndex) {
            return stories[slotIndex] || null;
        }

        // Build a single card. story=null → dimmed empty slot
        function buildCard(story, isActive, slotIndex) {
            const card = document.createElement('div');
            card.className = `story-card ${isActive ? 'active' : 'side'}`;

            if (story && story.cover_image) {
                card.style.backgroundColor    = '#ffffff';
                card.style.backgroundImage      = `url('${story.cover_image}')`;
                card.style.backgroundSize       = 'contain';
                card.style.backgroundPosition   = 'center';
                card.style.backgroundRepeat     = 'no-repeat';
            }

            if (!story) {
                card.style.opacity = '0.35';
                card.style.cursor  = 'default';
                card.style.pointerEvents = 'none';
                card.style.animation = 'cardFadeIn 0.4s ease both';
                card.innerHTML = '';
                return card;
            }

            card.innerHTML = ''; // No more play icon here

            if (isActive) {
                const anim = navDir > 0 ? 'slideFromLeft' : navDir < 0 ? 'slideFromRight' : 'cardFadeIn';
                card.style.animation = `${anim} 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both`;
            } else {
                card.style.animation = 'cardFadeIn 0.4s ease both';
                // Side cards with stories are clickable to navigate
                card.addEventListener('click', () => {
                    currentIndex = slotIndex;
                    renderSlider();
                });
            }

            // Active card click → open story detail page
            if (isActive) {
                card.addEventListener('click', () => {
                    window.navigateTo('story-detail.html?id=' + story.id);
                });
            }

            return card;
        }

        function renderSlider() {
            track.innerHTML       = '';
            dotsContainer.innerHTML = '';

            const prevSlot   = (currentIndex - 1 + TOTAL_SLOTS) % TOTAL_SLOTS;
            const nextSlot   = (currentIndex + 1) % TOTAL_SLOTS;

            const prevStory   = storyAt(prevSlot);
            const activeStory = storyAt(currentIndex);
            const nextStory   = storyAt(nextSlot);

            track.appendChild(buildCard(prevStory, false, prevSlot));
            track.appendChild(buildCard(activeStory, true, currentIndex));
            track.appendChild(buildCard(nextStory, false, nextSlot));

            // Always render TOTAL_SLOTS dots
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                const dot = document.createElement('button');
                dot.className = `dot ${i === currentIndex ? 'active' : ''}`;
                dot.setAttribute('aria-label', `القصة ${i + 1}`);
                dot.addEventListener('click', () => {
                    navDir = i > currentIndex ? 1 : -1;
                    currentIndex = i;
                    renderSlider();
                });
                dotsContainer.appendChild(dot);
            }
        }

        // Arrow controls — always wrap within TOTAL_SLOTS
        document.getElementById('arrow-right').addEventListener('click', () => {
            navDir = -1;
            currentIndex = (currentIndex - 1 + TOTAL_SLOTS) % TOTAL_SLOTS;
            renderSlider();
        });

        document.getElementById('arrow-left').addEventListener('click', () => {
            navDir = 1;
            currentIndex = (currentIndex + 1) % TOTAL_SLOTS;
            renderSlider();
        });

        // Keyboard nav
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                navDir = -1;
                currentIndex = (currentIndex - 1 + TOTAL_SLOTS) % TOTAL_SLOTS;
                renderSlider();
            } else if (e.key === 'ArrowLeft') {
                navDir = 1;
                currentIndex = (currentIndex + 1) % TOTAL_SLOTS;
                renderSlider();
            }
        });

        // Swipe support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        track.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        track.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50; 
            const deltaX = touchEndX - touchStartX;

            if (Math.abs(deltaX) > swipeThreshold) {
                if (deltaX > 0) {
                    navDir = -1; // Swipe Right → Prev
                    currentIndex = (currentIndex - 1 + TOTAL_SLOTS) % TOTAL_SLOTS;
                } else {
                    navDir = 1;  // Swipe Left → Next
                    currentIndex = (currentIndex + 1) % TOTAL_SLOTS;
                }
                renderSlider();
            }
        }

        initStories();
    </script>
<script src="js/header.js"></script>
</body>

</html>
