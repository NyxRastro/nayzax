<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نيزك — عالم كامل من الإبداع</title>
    <meta name="description"
        content="نيزك — موقع إبداعي ذو طابع فضائي مستقبلي يضم قصصاً مسموعة وأفلاماً ومجلة ومحتوى إبداعياً للأطفال." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* Page-specific overrides */
        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            overflow: hidden;
            margin: 0;
        }

        /* Animated star particles */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            opacity: var(--op, 0.7);
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: var(--op, 0.7);
                transform: scale(1);
            }

            50% {
                opacity: 0.2;
                transform: scale(0.5);
            }
        }

        /* Floating glow decoration */
        .hero-glow-1 {
            position: absolute;
            top: 10%;
            right: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(123, 77, 255, 0.35) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatGlow 6s ease-in-out infinite;
        }

        @keyframes floatGlow {

            0%,
            100% {
                transform: translateY(0px);
                opacity: 0.6;
            }

            50% {
                transform: translateY(-18px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <app-header></app-header>

    <!-- ===== HERO SECTION ===== -->
    <section class="hero" id="hero">
        <!-- Background image -->
        <div class="hero-bg"></div>

        <!-- Glow decoration -->
        <div class="hero-glow-1"></div>

        <!-- Star particles (generated by JS) -->
        <div class="hero-stars" id="stars-container"></div>

        <!-- Main Content -->
        <div class="hero-content">
            <h1 class="hero-logo" id="hero-title">نيزك</h1>
            <p class="hero-tagline">عالم كامل من الإبداع</p>
            <a href="story.html" class="btn-cta">
                <span>ابدأ</span>
            </a>
        </div>
    </section>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Generate star particles
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${2 + Math.random() * 4}s;
        --op: ${0.3 + Math.random() * 0.7};
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
        animation-delay: ${Math.random() * 4}s;
      `;
            starsContainer.appendChild(star);
        }
    </script>
</body>

</html>
