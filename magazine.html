<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المجلة — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .page-bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.93) 0%,
                    rgba(15, 7, 38, 0.88) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        .stars-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--op, 0.6); }
            50% { opacity: 0.1; }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 78px;
            box-sizing: border-box;
        }

        /* ===== MAGAZINE CAROUSEL ===== */
        .slider-wrapper {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Arrows — match story.html exactly */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            width: 44px;
            height: 44px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .arrow-shape {
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            transition: filter 0.25s ease, opacity 0.25s ease;
            opacity: 0.75;
        }

        .btn-prev .arrow-shape {
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent #C084FC;
        }

        .btn-next .arrow-shape {
            border-width: 12px 18px 12px 0;
            border-color: transparent #C084FC transparent transparent;
        }

        .nav-arrow:hover .arrow-shape {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(192, 132, 252, 0.9));
        }

        .btn-prev { right: 28px; }
        .btn-next { left: 28px; }

        /* ===== TRACK ===== */
        .cards-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px; 
            position: relative;
            width: 100%;
            height: 450px;
        }

        /* ===== CARDS ===== */
        .mag-card-container {
            position: relative;
            border-radius: 26px;
            flex-shrink: 0;
            cursor: pointer;
            overflow: hidden;
            background: linear-gradient(135deg, #D89BFF 0%, #9B67D7 55%, #7B4DBD 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.10);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-size: cover;
            background-position: center;
        }

        .mag-card-container.active {
            width: 280px;
            height: 400px;
            opacity: 1;
            z-index: 10;
            box-shadow: 0 22px 70px rgba(192, 132, 252, 0.40), 0 10px 30px rgba(0, 0, 0, 0.28);
            transform: scale(1);
        }

        .mag-card-container.side {
            width: 200px;
            height: 280px;
            opacity: .75;
            z-index: 5;
            transform: scale(0.9);
        }

        .mag-card-container.far-side {
            width: 150px;
            height: 210px;
            opacity: .4;
            z-index: 2;
            transform: scale(0.8);
        }

        .mag-card-container:hover {
            transform: translateY(-8px) scale(1.05);
            opacity: 1;
        }
        .mag-card-container.active:hover {
            transform: translateY(-8px) scale(1.02);
        }

        .read-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 10;
            width: 70px;
            height: 70px;
            background: rgba(192, 132, 252, 0.2);
            border: 2px solid #C084FC;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(4px);
            color: #C084FC;
            font-size: 1.8rem;
        }

        .mag-card-container.active:hover .read-icon {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 25px rgba(192, 132, 252, 0.5);
        }

        /* ===== DOTS ===== */
        .carousel-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(45deg);
            border-radius: 1.5px;
            cursor: pointer;
            transition: transform .25s ease, background .25s ease;
            opacity: .75;
            border: none;
        }

        .dot.active {
            background: #C084FC;
            transform: rotate(45deg) scale(1.4);
            box-shadow: 0 0 10px rgba(192, 132, 252, 0.8);
            opacity: 1;
        }

        /* === DIRECTIONAL SLIDE ANIMATIONS === */
        @keyframes slideFromRight {
            from { opacity: 0; transform: translateX(120px) scale(0.85); }
            to   { opacity: 1; transform: translateX(0)     scale(1);    }
        }
        @keyframes slideFromLeft {
            from { opacity: 0; transform: translateX(-120px) scale(0.85); }
            to   { opacity: 1; transform: translateX(0)      scale(1);    }
        }
        @keyframes magFadeIn {
            from { opacity: 0; transform: scale(0.85) translateY(16px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);    }
        }

        /* Responsive Tweaks */
        @media (max-width: 900px) {
            .cards-track { gap: 20px; }
            .mag-card-container.active { width: 220px; height: 310px; }
            .mag-card-container.side { width: 160px; height: 230px; }
            .mag-card-container.far-side { width: 110px; height: 160px; }
        }

        @media (max-width: 620px) {
            .content-wrapper { padding-top: 0; }
            .cards-track { gap: 10px; }
            .mag-card-container.active { width: 180px; height: 260px; }
            .mag-card-container.side { width: 100px; height: 140px; }
            .mag-card-container.far-side { display: none; } 
            
            .slider-wrapper { top: 42%; }

            .carousel-dots {
                left: 0; right: 0; width: 100%; bottom: 125px;
                transform: none; gap: 15px;
            }

            .dot {
                width: 9px; height: 9px;
                background: #FFFFFF !important;
                opacity: 1 !important;
            }

            .dot.active {
                background: #D89BFF !important;
                transform: rotate(45deg) scale(1.4);
            }

            .nav-arrow { display: none !important; }
        }
    </style>
</head>

<body>
    <div class="page-bg-container">
        <div class="page-bg"></div>
        <div class="stars-overlay" id="stars-container"></div>
    </div>

    <app-header></app-header>

    <main class="content-wrapper">
        <div class="slider-wrapper" id="mag-slider">
            <button class="nav-arrow btn-prev" id="mag-prev" aria-label="السابق">
                <span class="arrow-shape"></span>
            </button>

            <div class="cards-track" id="mag-track">
                <!-- Cards injected via JS -->
            </div>

            <button class="nav-arrow btn-next" id="mag-next" aria-label="التالي">
                <span class="arrow-shape"></span>
            </button>
        </div>

        <div class="carousel-dots" id="mag-dots"></div>
    </main>

    <script src="js/header.js"></script>
    <script>
        // Stars background
        const starsBox = document.getElementById('stars-container');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = 1 + Math.random() * 2.5;
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                --dur: ${2 + Math.random() * 5}s;
                --op: ${0.2 + Math.random() * 0.7};
                opacity: var(--op);
                animation-delay: ${Math.random() * 5}s;
            `;
            starsBox.appendChild(star);
        }

        // Carousel Logic — Matching story.html
        let magazines = [];
        let currentIdx = 0;
        let navDir = 0; 
        const TOTAL_SLOTS = 5; 

        const track = document.getElementById('mag-track');
        const dotsContainer = document.getElementById('mag-dots');
        const sliderWrapper = document.getElementById('mag-slider');

        async function initMagazines() {
            try {
                const res = await fetch('/api/magazines');
                if (!res.ok) throw new Error('Failed to fetch');
                magazines = await res.json();
                
                if (magazines.length === 0) {
                    track.innerHTML = '<div style="color: #94a3b8; font-size: 1.2rem;">لا توجد مجلات مضافة حالياً</div>';
                    return;
                }

                currentIdx = 0;
                renderSlider();
            } catch (err) { 
                console.error(err);
                track.innerHTML = '<div style="color: #EF4444;">حدث خطأ أثناء تحميل البيانات</div>';
            }
        }

        function magAt(slotIndex) {
            return magazines[slotIndex] || null;
        }

        function buildCard(mag, isActive, slotIndex, pos) {
            const card = document.createElement('div');
            const isSide = pos === 1 || pos === 3;
            const isFarSide = pos === 0 || pos === 4;
            let sizeClass = isActive ? 'active' : (isSide ? 'side' : 'far-side');
            
            card.className = `mag-card-container ${sizeClass}`;

            if (mag && mag.cover_image) {
                card.style.backgroundImage = `url('${mag.cover_image}')`;
            }

            if (!mag) {
                // Placeholder — match story.html exactly
                card.style.opacity = '0.35';
                card.style.cursor  = 'default';
                card.style.pointerEvents = 'none';
                card.style.animation = 'magFadeIn 0.4s ease both';
                return card;
            }

            card.innerHTML = `<div class="read-icon"><i class="fa-solid fa-book-open"></i></div>`;

            if (isActive) {
                const anim = navDir > 0 ? 'slideFromLeft' : navDir < 0 ? 'slideFromRight' : 'magFadeIn';
                card.style.animation = `${anim} 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both`;
                
                card.addEventListener('click', () => {
                    if (mag.pdf_file) {
                        window.navigateTo(`magazine-detail.html?pdf=${encodeURIComponent(mag.pdf_file)}&title=${encodeURIComponent(mag.title)}`);
                    } else {
                        alert('هذا العدد لا يحتوي على ملف PDF حالياً');
                    }
                });
            } else {
                card.style.animation = 'magFadeIn 0.4s ease both';
                card.addEventListener('click', () => {
                    navDir = slotIndex > currentIdx ? 1 : -1;
                    currentIdx = slotIndex;
                    renderSlider();
                });
            }

            return card;
        }

        function renderSlider() {
            track.innerHTML       = '';
            dotsContainer.innerHTML = '';

            const n = TOTAL_SLOTS;
            
            // Story logic slots: we show 5 slots (0 to 4)
            // Indices centered on currentIdx
            const slots = [
                (currentIdx - 2 + n) % n,
                (currentIdx - 1 + n) % n,
                currentIdx,
                (currentIdx + 1) % n,
                (currentIdx + 2) % n
            ];

            slots.forEach((slotIdx, pos) => {
                const mag = magAt(slotIdx);
                const isActive = pos === 2;
                track.appendChild(buildCard(mag, isActive, slotIdx, pos));
            });

            // Dots - match TOTAL_SLOTS
            for (let i = 0; i < TOTAL_SLOTS; i++) {
                const dot = document.createElement('button');
                dot.className = `dot ${i === currentIdx ? 'active' : ''}`;
                dot.addEventListener('click', () => {
                    navDir = i > currentIdx ? 1 : -1;
                    currentIdx = i;
                    renderSlider();
                });
                dotsContainer.appendChild(dot);
            }
        }

        function movePrev() {
            navDir = -1;
            currentIdx = (currentIdx - 1 + TOTAL_SLOTS) % TOTAL_SLOTS;
            renderSlider();
        }

        function moveNext() {
            navDir = 1;
            currentIdx = (currentIdx + 1) % TOTAL_SLOTS;
            renderSlider();
        }

        document.getElementById('mag-prev').onclick = movePrev;
        document.getElementById('mag-next').onclick = moveNext;

        // Keyboard nav
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') movePrev();
            else if (e.key === 'ArrowLeft') moveNext();
        });

        // Swipe support — EXACT COPY from story.html logic
        let touchStartX = 0;
        let touchEndX = 0;

        track.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        track.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50; 
            const deltaX = touchEndX - touchStartX;

            if (Math.abs(deltaX) > swipeThreshold) {
                if (deltaX > 0) {
                    movePrev(); // Swipe Right → Prev
                } else {
                    moveNext(); // Swipe Left → Next
                }
            }
        }

        initMagazines();
    </script>
</body>

</html>
