<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المجلة — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .page-bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.93) 0%,
                    rgba(15, 7, 38, 0.88) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        .stars-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--op, 0.6); }
            50% { opacity: 0.1; }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 78px;
            box-sizing: border-box;
        }

        /* ===== MAGAZINE CAROUSEL ===== */
        .slider-wrapper {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Arrows — match story.html exactly */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 44px;
            height: 44px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .arrow-shape {
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            transition: filter 0.25s ease, opacity 0.25s ease;
            opacity: 0.75;
        }

        .btn-prev .arrow-shape {
            border-width: 12px 0 12px 18px;
            border-color: transparent transparent transparent #C084FC;
        }

        .btn-next .arrow-shape {
            border-width: 12px 18px 12px 0;
            border-color: transparent #C084FC transparent transparent;
        }

        .nav-arrow:hover .arrow-shape {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(192, 132, 252, 0.9));
        }

        .btn-prev { right: 28px; }
        .btn-next { left: 28px; }

        /* ===== TRACK ===== */
        .cards-track {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 90px;
            position: relative;
        }

        /* ===== CARDS ===== */
        .mag-card-container {
            position: relative;
            border-radius: 26px;
            flex-shrink: 0;
            cursor: pointer;
            overflow: hidden;
            background: linear-gradient(135deg, #D89BFF 0%, #9B67D7 55%, #7B4DBD 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.10);
            transition: transform .45s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow .35s ease, opacity .35s ease;
        }

        .mag-card-container.active {
            width: 300px;
            height: 300px;
            opacity: 1;
            z-index: 5;
            box-shadow: 0 22px 70px rgba(192, 132, 252, 0.40), 0 10px 30px rgba(0, 0, 0, 0.28);
        }

        .mag-card-container.side {
            width: 220px;
            height: 220px;
            opacity: .85;
            z-index: 3;
        }

        .mag-card-container:hover {
            transform: translateY(-8px) scale(1.05);
            opacity: 1;
        }

        .play-icon {
            position: absolute;
            bottom: 18px;
            right: 18px;
            z-index: 10;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 15px 0 15px 20px;
            border-color: transparent transparent transparent rgba(235, 205, 255, 0.85);
            opacity: .9;
            transition: filter .25s ease, opacity .25s ease, transform .25s ease;
            pointer-events: none;
        }

        /* ===== DOTS ===== */
        .carousel-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(45deg);
            border-radius: 1.5px;
            cursor: pointer;
            transition: transform .25s ease, background .25s ease;
            opacity: .75;
            border: none;
        }

        .dot.active {
            background: #C084FC;
            transform: rotate(45deg) scale(1.4);
            box-shadow: 0 0 10px rgba(192, 132, 252, 0.8);
            opacity: 1;
        }

        /* === DIRECTIONAL SLIDE ANIMATIONS === */
        @keyframes slideFromRight {
            from { opacity: 0; transform: translateX(120px) scale(0.85); }
            to   { opacity: 1; transform: translateX(0)     scale(1);    }
        }
        @keyframes slideFromLeft {
            from { opacity: 0; transform: translateX(-120px) scale(0.85); }
            to   { opacity: 1; transform: translateX(0)      scale(1);    }
        }
        @keyframes magFadeIn {
            from { opacity: 0; transform: scale(0.85) translateY(16px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);    }
        }

        /* Responsive Tweaks */
        @media (max-width: 900px) {
            .cards-track { gap: 44px; }
            .mag-card-container.active { width: 260px; height: 260px; }
            .mag-card-container.side { width: 200px; height: 200px; }
        }

        @media (max-width: 600px) {
            .content-wrapper { padding-top: 0; }
            .cards-track { gap: 10px; }
            .mag-card-container.active { width: 140px; height: 140px; }
            .mag-card-container.side { width: 100px; height: 100px; }
            
            .slider-wrapper { top: 42%; }

            .carousel-dots {
                left: 0; right: 0; width: 100%; bottom: 125px;
                transform: none; gap: 15px;
            }

            .dot {
                width: 9px; height: 9px;
                background: #FFFFFF !important;
                opacity: 1 !important;
            }

            .dot.active {
                background: #D89BFF !important;
                transform: rotate(45deg) scale(1.4);
            }

            .nav-arrow { display: none !important; }
        }
    </style>
</head>

<body>
    <div class="page-bg-container">
        <div class="page-bg"></div>
        <div class="stars-overlay" id="stars-container"></div>
    </div>

    <app-header></app-header>

    <main class="content-wrapper">
        <div class="slider-wrapper">
            <button class="nav-arrow btn-prev" id="mag-prev" aria-label="السابق">
                <span class="arrow-shape"></span>
            </button>

            <div class="cards-track" id="mag-track">
                <!-- Cards injected via JS -->
            </div>

            <button class="nav-arrow btn-next" id="mag-next" aria-label="التالي">
                <span class="arrow-shape"></span>
            </button>
        </div>

        <div class="carousel-dots" id="mag-dots"></div>
    </main>

    <script src="js/header.js"></script>
    <script>
        // Stars background
        const starsBox = document.getElementById('stars-container');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = 1 + Math.random() * 2.5;
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                --dur: ${2 + Math.random() * 5}s;
                --op: ${0.2 + Math.random() * 0.7};
                opacity: var(--op);
                animation-delay: ${Math.random() * 5}s;
            `;
            starsBox.appendChild(star);
        }

        // Carousel Logic
        let magazines = [];
        let currentIdx = 0;
        let navDir = 0; // -1 = backward, +1 = forward

        const track = document.getElementById('mag-track');
        const dotsContainer = document.getElementById('mag-dots');

        async function initMagazines() {
            try {
                // Fetch from your magazines API or use default
                magazines = [
                    { id: 1, cover: 'images/mag1.jpg' },
                    { id: 2, cover: 'images/mag2.jpg' },
                    { id: 3, cover: 'images/mag3.jpg' },
                    { id: 4, cover: 'images/mag4.jpg' },
                    { id: 5, cover: 'images/mag5.jpg' }
                ];
                currentIdx = Math.floor(magazines.length / 2);
                renderSlider();
            } catch (err) { console.error(err); }
        }

        function renderSlider() {
            track.innerHTML = '';
            dotsContainer.innerHTML = '';

            const indices = [
                (currentIdx - 1 + magazines.length) % magazines.length,
                currentIdx,
                (currentIdx + 1) % magazines.length,
            ];

            indices.forEach((mIdx, pos) => {
                const isActive = pos === 1;
                const card = document.createElement('div');
                card.className = `mag-card-container ${isActive ? 'active' : 'side'}`;
                
                // Content (Photo block with play icon)
                card.innerHTML = `<div class="play-icon"></div>`;

                // Animation
                if (isActive) {
                    const anim = navDir > 0 ? 'slideFromLeft' : navDir < 0 ? 'slideFromRight' : 'magFadeIn';
                    card.style.animation = `${anim} 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both`;
                } else {
                    card.style.animation = `magFadeIn 0.4s ease both`;
                }

                // Click behavior
                if (!isActive) {
                    card.addEventListener('click', () => {
                        navDir = pos === 0 ? -1 : 1;
                        currentIdx = mIdx;
                        renderSlider();
                    });
                } else {
                    card.addEventListener('click', () => {
                        window.navigateTo('magazine-detail.html');
                    });
                }

                track.appendChild(card);
            });

            // Dots
            magazines.forEach((_, i) => {
                const dot = document.createElement('button');
                dot.className = `dot ${i === currentIdx ? 'active' : ''}`;
                dot.addEventListener('click', () => {
                    navDir = i < currentIdx ? -1 : 1;
                    currentIdx = i;
                    renderSlider();
                });
                dotsContainer.appendChild(dot);
            });
        }

        document.getElementById('mag-prev').onclick = () => {
            navDir = -1;
            currentIdx = (currentIdx - 1 + magazines.length) % magazines.length;
            renderSlider();
        };

        document.getElementById('mag-next').onclick = () => {
            navDir = 1;
            currentIdx = (currentIdx + 1) % magazines.length;
            renderSlider();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                navDir = -1;
                currentIdx = (currentIdx - 1 + magazines.length) % magazines.length;
                renderSlider();
            } else if (e.key === 'ArrowLeft') {
                navDir = 1;
                currentIdx = (currentIdx + 1) % magazines.length;
                renderSlider();
            }
        });

        initMagazines();
    </script>
</body>

</html>
