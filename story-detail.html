<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لسان اليمن (الهمداني) — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        body {
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
        }

        /* ===== FULL-SCREEN BG (Same as story.html) ===== */
        .story-page {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .story-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .story-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.93) 0%,
                    rgba(15, 7, 38, 0.88) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        /* Animated stars overlay */
        .story-stars {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .s-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: sTwinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes sTwinkle {

            0%,
            100% {
                opacity: var(--op, 0.6);
            }

            50% {
                opacity: 0.1;
            }
        }

        /* Subtle center glow */
        .story-nebula-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(192, 132, 252, 0.05) 0%, transparent 65%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== CONTENT WRAPPER ===== */
        .detail-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 70px;
            /* offset for nav */
        }

        .detail-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            padding: 0 40px;
        }

        /* Card side (left visually in design) */
        .detail-container {
            flex-direction: row-reverse;
            gap: 40px;
            /* Reduced from 60 */
        }

        .detail-card-wrapper {
            flex-shrink: 0;
        }

        /* The square card with folded corner */
        .story-card {
            position: relative;
            background: linear-gradient(135deg, #D89BFF 0%, #9B67D7 55%, #7B4DBD 100%);
            border-radius: 28px;
            /* Slightly less rounded */
            width: 330px;
            /* Reduced height from 330 to 310 */
            height: 310px;
            box-shadow: 0 0 60px rgba(123, 77, 255, 0.4);
            animation: float 6s ease-in-out infinite;
            margin-right: 150px;
            /* overflow: hidden; Removed to prevent cutting off play icon */
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* Folded corner effect */
        .story-card::after {
            content: '';
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 64px;
            /* Reduced from 80 */
            height: 64px;
            /* Reduced from 80 */
            background: #0F0823;
            border-top-left-radius: 16px;
            /* Reduced from 20 */
            box-shadow: -15px -15px 30px rgba(123, 77, 255, 0.2);
        }

        /* Large play icon */
        .play-icon {
            position: absolute;
            bottom: -10px;
            right: -20px;
            z-index: 10;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 32px 0 32px 48px;
            /* Reduced from 40/0/40/60 */
            border-color: transparent transparent transparent #C084FC;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
            cursor: pointer;
            transition: transform 0.25s ease, filter 0.25s ease;
            transform-origin: center;
        }

        .story-card:hover .play-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px rgba(192, 132, 252, 0.8));
            border-color: transparent transparent transparent #D89BFF;
        }

        /* Text side (right visually) */
        .detail-text {
            flex: 1;
            max-width: 550px;
            /* Reduced from 700 */
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* Right align in RTL */
            text-align: right;
        }

        .detail-title {
            font-family: 'Cairo', sans-serif;
            font-size: 3rem;
            /* Reduced from 3.8 */
            font-weight: 800;
            color: #C084FC; /* Changed from #9C71D9 to match vibrant mobile/other pages */
            margin-bottom: 35px;
            /* Increased from 20 for more breathing room */
            text-shadow: 0 0 16px rgba(156, 113, 217, 0.4);
            line-height: 1.2;
        }

        .detail-desc {
            font-family: 'Cairo', sans-serif;
            font-size: 1.05rem;
            /* Reduced from 1.25 */
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.7;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 600px) {
            .detail-content {
                padding-top: 140px;
                padding-bottom: 40px;
                height: auto;
                min-height: 100vh;
                display: block;
            }
            .detail-container {
                flex-direction: column !important;
                align-items: center;
                gap: 30px;
                padding: 0 24px;
            }
            .story-card {
                width: 260px;
                /* Reduced height from 260 to 240 */
                height: 240px;
                margin-right: 0;
            }
            .story-card::after {
                width: 50px;
                height: 50px;
            }
            .play-icon {
                border-width: 28px 0 28px 42px;
                bottom: -8px;
                right: -15px;
            }
            .detail-text {
                align-items: center;
                text-align: center;
                max-width: 100%;
            }
            .detail-title {
                font-size: 1.95rem; /* Reduced from 2.4rem per user request */
                margin-bottom: 20px;
            }
            .detail-desc {
                font-size: 1rem;
                line-height: 1.6;
            }
        }

        /* ===== AUDIO PLAYER MODAL ===== */
        .audio-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4, 2, 8, 0.96);
            backdrop-filter: blur(14px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .audio-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .audio-modal-content {
            position: relative;
            width: 88%;
            max-width: 380px;
            aspect-ratio: 1;
            background: rgba(26, 15, 46, 0.4);
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .audio-modal-overlay.active .audio-modal-content {
            transform: scale(1) translateY(-30px);
        }

        .audio-cover-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.4;
            filter: blur(8px);
            z-index: 0;
            transition: background-image 0.3s ease;
        }
        
        .audio-cover-img {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .audio-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: none;
            border: none;
            color: #000;
            width: 40px;
            height: 40px;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.8), 0 0 20px rgba(192, 132, 252, 0.5);
            font-weight: 900;
        }

        .audio-modal-close:hover {
            transform: scale(1.1);
            color: #111;
            text-shadow: 0 0 15px rgba(192, 132, 252, 1), 0 0 30px rgba(192, 132, 252, 0.8);
        }

        .audio-controls-layer {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(0deg, rgba(8,3,20,0.95) 0%, rgba(8,3,20,0.3) 100%);
        }



        .audio-play-toggle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D89BFF, #7B4DBD);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(192, 132, 252, 0.5);
            transition: all 0.2s ease;
        }

        .audio-play-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(192, 132, 252, 0.8);
        }

        .audio-icon-shape {
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 14px 0 14px 22px;
            border-color: transparent transparent transparent #fff;
            margin-left: 6px;
            transition: all 0.2s ease;
        }

        .audio-play-toggle.playing .audio-icon-shape {
            border-style: double;
            border-width: 0 0 0 20px;
            border-color: #fff;
            height: 24px;
            margin-left: 0;
        }
    </style>
</head>

<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="story-page">
        <div class="story-bg"></div>
        <div class="story-nebula-glow"></div>
        <div class="story-stars" id="story-stars"></div>
    </div>

    <app-header></app-header>

    <!-- ===== AUDIO PLAYER MODAL ===== -->
    <div class="audio-modal-overlay" id="audio-modal">
        <div class="audio-modal-content">
            <button class="audio-modal-close" id="audio-close" aria-label="إغلاق">&times;</button>
            <div class="audio-cover-bg" id="audio-cover-bg"></div>
            <div class="audio-cover-img" id="audio-cover-img"></div>
            
            <div class="audio-controls-layer">
                <button id="audio-play-toggle" class="audio-play-toggle" aria-label="تشغيل / إيقاف">
                    <span class="audio-icon-shape" id="audio-icon-state"></span>
                </button>
            </div>
            <audio id="story-audio-element" style="display: none;"></audio>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="detail-content">
        <div class="detail-container">

            <!-- Card (Left visually) -->
            <div class="detail-card-wrapper">
                <div class="story-card" id="detail-card">
                    <div class="play-icon" id="play-icon"></div>
                </div>
            </div>

            <!-- Text (Right visually) -->
            <div class="detail-text">
                <h1 class="detail-title" id="detail-title">جاري التحميل...</h1>
                <p class="detail-desc" id="detail-desc"></p>
            </div>

        </div>
    </div>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // ===== STAR PARTICLES =====
        const starsLayer = document.getElementById('story-stars');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 's-star';
            const size = 1 + Math.random() * 2.5;
            s.style.cssText = `
    left: ${Math.random() * 100}%;
    top: ${Math.random() * 100}%;
    width: ${size}px;
    height: ${size}px;
    --dur: ${2 + Math.random() * 5}s;
    --op: ${0.2 + Math.random() * 0.7};
    opacity: var(--op);
    animation-delay: ${Math.random() * 5}s;
  `;
            starsLayer.appendChild(s);
        }

        // ===== LOAD STORY FROM DATABASE =====
        (async function loadStory() {
            const params  = new URLSearchParams(window.location.search);
            const storyId = params.get('id');

            const titleEl = document.getElementById('detail-title');
            const descEl  = document.getElementById('detail-desc');
            const cardEl  = document.getElementById('detail-card');
            const audioEl = document.getElementById('story-audio');
            const playEl  = document.getElementById('play-icon');

            // ── Fetch all stories and find ours ──
            try {
                const res     = await fetch('/api/stories');
                const stories = await res.json();
                const story   = storyId
                    ? stories.find(s => String(s.id) === storyId)
                    : stories[0]; // fallback: first story

                if (!story) {
                    titleEl.textContent = 'القصة غير موجودة';
                    descEl.textContent  = 'لم يتم العثور على القصة المطلوبة.';
                    return;
                }

                // ── Populate page title & text ──
                document.title = (story.title || 'قصة') + ' — نيزك';
                titleEl.textContent = story.title || '';
                descEl.textContent  = story.description
                    ? story.description
                    : (story.duration ? 'المدة: ' + story.duration : '');

                // ── Apply cover image to card ──
                if (story.cover_image) {
                    cardEl.style.backgroundColor    = '#ffffff';
                    cardEl.style.backgroundImage    = `url('${story.cover_image}')`;
                    cardEl.style.backgroundSize     = 'contain';
                    cardEl.style.backgroundPosition = 'center';
                    cardEl.style.backgroundRepeat   = 'no-repeat';
                }

                // ── Set up audio modal trigger ──
                if (story.audio_file) {
                    playEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openAudioModal(story);
                    });
                    
                    playEl.style.pointerEvents = 'auto';
                    playEl.style.cursor        = 'pointer';
                } else {
                    playEl.style.opacity = '0.35';
                    playEl.title         = 'لا يوجد ملف صوتي';
                }

            } catch (err) {
                console.error('Error loading story:', err);
                titleEl.textContent = 'خطأ في التحميل';
            }
        })();

        // ===== AUDIO MODAL LOGIC =====
        const audioModal = document.getElementById('audio-modal');
        const audioCloseBtn = document.getElementById('audio-close');
        const audioCoverBg = document.getElementById('audio-cover-bg');
        const audioCoverImg = document.getElementById('audio-cover-img');
        const audioPlayToggle = document.getElementById('audio-play-toggle');
        const audioElement = document.getElementById('story-audio-element');

        function openAudioModal(story) {
            
            if (story.cover_image) {
                audioCoverBg.style.backgroundImage = `url('${story.cover_image}')`;
                audioCoverImg.style.backgroundImage = `url('${story.cover_image}')`;
            } else {
                audioCoverBg.style.backgroundImage = '';
                audioCoverImg.style.backgroundImage = '';
            }

            if (story.audio_file) {
                audioElement.src = story.audio_file;
            } else {
                audioElement.src = '';
            }

            audioModal.classList.add('active');
            audioPlayToggle.classList.remove('playing');
        }

        audioCloseBtn.addEventListener('click', () => {
            audioModal.classList.remove('active');
            audioElement.pause();
            audioPlayToggle.classList.remove('playing');
        });

        audioPlayToggle.addEventListener('click', () => {
            if (!audioElement.src || audioElement.src.endsWith('undefined') || audioElement.src.endsWith('null')) return;

            if (audioElement.paused) {
                audioElement.play().then(() => {
                    audioPlayToggle.classList.add('playing');
                }).catch(err => console.error("Error playing audio", err));
            } else {
                audioElement.pause();
                audioPlayToggle.classList.remove('playing');
            }
        });

        audioElement.addEventListener('ended', () => {
            audioPlayToggle.classList.remove('playing');
        });
    </script>
</body>

</html>
