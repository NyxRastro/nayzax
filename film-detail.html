<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لسان اليمن (الهمداني) — فيلم — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        body {
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        /* ===== FULL-SCREEN BG ===== */
        .story-page {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .story-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .story-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 4, 25, 0.93) 0%,
                    rgba(15, 7, 38, 0.88) 40%,
                    rgba(8, 3, 20, 0.95) 100%);
        }

        /* Animated stars overlay */
        .story-stars {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .s-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: sTwinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes sTwinkle {

            0%,
            100% {
                opacity: var(--op, 0.6);
            }

            50% {
                opacity: 0.1;
            }
        }

        /* Subtle center glow */
        .story-nebula-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(201, 156, 246, 0.05) 0%, transparent 50%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== CONTENT WRAPPER ===== */
        .detail-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 86px;
            /* offset for nav */
        }

        .detail-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: flex-end;
            /* Align to bottom visually matching screenshot */
            justify-content: space-between;
            gap: 60px;
            padding: 0 40px;
        }

        /* ===== LEFT VISUALLY (CARD) ===== */
        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .film-card {
            position: relative;
            background: linear-gradient(135deg, #D89BFF 0%, #9B67D7 55%, #7B4DBD 100%);
            /* Lighter pink to purple */
            border-radius: 28px;
            width: 380px;
            height: 380px;
            box-shadow: 0 10px 40px rgba(123, 77, 255, 0.2);
            /* subtle float */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Folded bottom-right corner */
        .film-card::after {
            content: '';
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 80px;
            height: 80px;
            background: #281851f0;
            border-top-left-radius: 24px;
        }

        /* Huge play icon extending over the fold */
        .play-icon {
            position: absolute;
            bottom: -8px;
            right: -16px;
            z-index: 10;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 38px 0 38px 46px;
            /* point right */
            border-color: transparent transparent transparent #D98BFF;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.35));
            cursor: pointer;
            transition: transform 0.25s ease, filter 0.25s ease;
            transform-origin: left center;
        }

        .film-card:hover .play-icon {
            transform: scale(1.08);
            filter: drop-shadow(0 0 20px rgba(217, 139, 255, 0.7));
            border-color: transparent transparent transparent #F0C4FF;
        }

        .film-title {
            font-family: 'Cairo', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #D98BFF;
            /* Pink-purple text */
            text-align: center;
            margin: 0;
            text-shadow: 0 0 4px rgba(217, 139, 255, 0.3);
        }

        /* ===== RIGHT VISUALLY (LIST) ===== */
        .right-side {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            /* push list to the right */
            gap: 20px;
            padding-bottom: 60px;
            /* shift up relative to the card */
        }

        .film-menu-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: flex-start;
            /* align text to right side in RTL */
        }

        .film-menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .film-menu-item:hover {
            transform: translateX(-10px);
        }

        .film-menu-text {
            font-family: 'Cairo', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: #E2E8F0;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .film-menu-item:hover .film-menu-text {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .diamond-bullet {
            width: 14px;
            height: 14px;
            background-color: #CBD5E1;
            /* Light gray bullet */
            transform: rotate(45deg);
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .film-menu-item:hover .diamond-bullet {
            background-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .detail-container {
                flex-direction: column;
                align-items: center;
                gap: 40px;
                padding-bottom: 40px;
            }

            .right-side {
                align-items: center;
                padding-bottom: 0;
            }

            .film-menu-list {
                align-items: center;
            }

            .film-menu-item:hover {
                transform: scale(1.05);
            }
        }

        /* ===== MOBILE — side by side, no scroll ===== */
        @media (max-width: 600px) {
            html, body {
                overflow: hidden;
                height: 100%;
            }

            .detail-content {
                padding-top: 0;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Row: card LEFT, menu RIGHT */
            .detail-container {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 28px;
                padding: 0 20px;
                width: 100%;
            }

            /* Card on the left */
            .left-side {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
            }

            .film-card {
                width: 120px;
                height: 120px;
                animation: none;
                border-radius: 18px;
                box-shadow: 0 6px 24px rgba(123, 77, 255, 0.4);
            }

            .film-card::after {
                width: 34px;
                height: 34px;
            }

            .play-icon {
                border-width: 14px 0 14px 20px;
                bottom: -3px;
                right: -5px;
            }

            .film-title {
                font-size: 0.85rem;
                color: #D98BFF;
                text-align: center;
            }

            /* Menu on the right — all items same level */
            .right-side {
                padding-bottom: 0;
                align-items: flex-end;
                flex: 1;
            }

            .film-menu-list {
                align-items: flex-start;
                gap: 20px;
                width: 100%;
            }

            .film-menu-item {
                gap: 10px;
                width: 100%;
            }

            .film-menu-item:hover {
                transform: translateX(-6px);
            }

            .film-menu-text {
                font-size: 1.15rem;
                font-weight: 700;
            }

            .diamond-bullet {
                width: 9px;
                height: 9px;
                flex-shrink: 0;
            }
        }
    </style>
</head>

<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="story-page">
        <div class="story-bg"></div>
        <div class="story-nebula-glow"></div>
        <div class="story-stars" id="story-stars"></div>
    </div>

    <app-header></app-header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="detail-content">
        <div class="detail-container">

            <!-- Left visually (Text List) -->
            <div class="right-side">
                <ul class="film-menu-list">
                    <li class="film-menu-item">
                        <div class="diamond-bullet"></div>
                        <span class="film-menu-text">مشاهدة الفيلم</span>
                    </li>
                    <li class="film-menu-item" onclick="window.location.href='film-trailer.html'">
                        <div class="diamond-bullet"></div>
                        <span class="film-menu-text">التريلر</span>
                    </li>
                    <li class="film-menu-item" onclick="window.location.href='film-storyboard.html'">
                        <div class="diamond-bullet"></div>
                        <span class="film-menu-text">ستوري بورد</span>
                    </li>
                    <li class="film-menu-item" onclick="window.location.href='characters.html'">
                        <div class=" diamond-bullet">
                        </div>
                        <span class="film-menu-text">الشخصيات</span>
                    </li>
                </ul>
            </div>

            <!-- Right visually (Card) -->
            <!-- Because layout is RTL, flex standard direction puts first element on the right. 
                 By screenshot:
                 [Menu List]   ...   [Square Card w/ Title] -->
            <div class="left-side">
                <div class="film-card">
                    <div class="play-icon"></div>
                </div>
                <h2 class="film-title">لسان اليمن (الهمداني)</h2>
            </div>

        </div>
    </main>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // ===== STAR PARTICLES =====
        const starsLayer = document.getElementById('story-stars');
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 's-star';
            const size = 1 + Math.random() * 2.5;
            s.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                --dur: ${2 + Math.random() * 5}s;
                --op: ${0.2 + Math.random() * 0.7};
                opacity: var(--op);
                animation-delay: ${Math.random() * 5}s;
            `;
            starsLayer.appendChild(s);
        }
    </script>
</body>

</html>
