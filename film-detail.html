<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لسان اليمن (الهمداني) — فيلم — نيزك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Zain:wght@300;400;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* ===== PAGE BASE ===== */
        html,
        body {
            width: 100%;
            min-height: 100%;
            height: auto;
            margin: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .shooting-star-global { 
            z-index: 5 !important;
        }

        body {
            background: transparent !important;
            font-family: 'Cairo', sans-serif;
            color: #fff;
        }

        html {
            background: transparent !important;
        }

        /* ===== FULL-SCREEN BG ===== */
        .page-bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .page-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/nebula_bg.jpg');
            background-size: cover;
            background-position: center center;
            z-index: 0;
        }

        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(900px 420px at 50% 46%, rgba(192, 132, 252, 0.12), transparent 65%),
                linear-gradient(160deg,
                    rgba(10, 4, 25, 0.94) 0%,
                    rgba(15, 7, 38, 0.90) 40%,
                    rgba(8, 3, 20, 0.96) 100%);
        }

        .stars-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--op, 0.6); }
            50% { opacity: 0.12; }
        }

        /* ===== CONTENT WRAPPER ===== */
        .detail-content {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 150px;
            padding-bottom: 50px;
            box-sizing: border-box;
            /* offset for nav */
        }

        .detail-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: flex-end;
            /* Align to bottom visually matching screenshot */
            justify-content: space-between;
            gap: 60px;
            padding: 0 40px;
        }

        /* ===== LEFT VISUALLY (CARD) ===== */
        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .film-card {
            position: relative;
            background: linear-gradient(135deg, #D89BFF 0%, #9B67D7 55%, #7B4DBD 100%);
            /* Lighter pink to purple */
            border-radius: 28px;
            width: 240px;
            height: 360px;
            box-shadow: 0 10px 40px rgba(123, 77, 255, 0.2);
            /* subtle float */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }



        /* Huge play icon extending over the fold */
        .play-icon {
            position: absolute;
            bottom: -8px;
            right: -16px;
            z-index: 10;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 38px 0 38px 46px;
            /* point right */
            border-color: transparent transparent transparent #D98BFF;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.35));
            cursor: pointer;
            transition: transform 0.25s ease, filter 0.25s ease;
            transform-origin: left center;
        }

        .film-card:hover .play-icon {
            transform: scale(1.08);
            filter: drop-shadow(0 0 20px rgba(217, 139, 255, 0.7));
            border-color: transparent transparent transparent #F0C4FF;
        }

        .film-title {
            font-family: 'Cairo', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #D98BFF;
            /* Pink-purple text */
            text-align: center;
            margin: 0;
            text-shadow: 0 0 4px rgba(217, 139, 255, 0.3);
        }

        /* ===== RIGHT VISUALLY (LIST) ===== */
        .right-side {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            /* push list to the right */
            gap: 20px;
            padding-bottom: 60px;
            /* shift up relative to the card */
        }

        .film-menu-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 32px;
            align-items: flex-start;
            /* align text to right side in RTL */
        }

        .film-menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .film-menu-item:hover:not(.disabled) {
            transform: translateX(-10px);
        }

        .film-menu-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .film-menu-item.disabled .film-menu-text {
            color: #94a3b8;
        }

        .film-menu-text {
            font-family: 'Cairo', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: #E2E8F0;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .film-menu-item:hover .film-menu-text {
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .diamond-bullet {
            width: 14px;
            height: 14px;
            background-color: #CBD5E1;
            /* Light gray bullet */
            transform: rotate(45deg);
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .film-menu-item:hover .diamond-bullet {
            background-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .detail-container {
                flex-direction: column;
                align-items: center;
                gap: 40px;
                padding-bottom: 40px;
            }

            .right-side {
                align-items: center;
                padding-bottom: 0;
            }

            .film-menu-list {
                align-items: center;
            }

            .film-menu-item:hover {
                transform: scale(1.05);
            }
        }

        /* ===== MOBILE — side by side, no scroll ===== */
        @media (max-width: 600px) {
            html, body {
                overflow-y: auto;
                height: auto;
            }

            .detail-content {
                padding-top: 0;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Row: card LEFT, menu RIGHT */
            .detail-container {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 32px;
                padding: 0 20px;
                width: 100%;
                margin-top: -60px; /* Shift content UP */
            }

            /* Card on the left */
            .left-side {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
            }

            .film-card {
                width: 155px; /* Bigger card */
                height: 230px;
                animation: none;
                border-radius: 18px;
                box-shadow: 0 6px 24px rgba(123, 77, 255, 0.4);
            }

            .film-card::after {
                width: 34px;
                height: 34px;
            }

            .play-icon {
                border-width: 18px 0 18px 26px; /* Bigger play icon */
                bottom: -5px;
                right: -8px;
            }

            .film-title {
                font-size: 1.1rem; /* Bigger title */
                color: #D98BFF;
                text-align: center;
            }

            /* Menu on the right — all items same level */
            .right-side {
                padding-bottom: 0;
                align-items: flex-end;
                flex: 1;
            }

            .film-menu-list {
                align-items: flex-start;
                gap: 11px; /* Even shorter gap */
                width: 100%;
            }

            .film-menu-item {
                gap: 7px;
                width: 100%;
            }

            .film-menu-item:hover:not(.disabled) {
                transform: translateX(-6px);
            }

            .film-menu-text {
                font-size: 1.15rem; /* Even "shorter" (smaller) font size */
                font-weight: 700;
            }

            .diamond-bullet {
                width: 9px;
                height: 9px;
                flex-shrink: 0;
            }
        }

        /* ===== LIGHTBOX MODAL ===== */
        .lightbox-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 4, 20, 0.96);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox-img {
            max-width: 85%;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .lightbox-modal.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 40px;
            left: 40px; /* Moved to left for better visibility in RTL */
            background: #fff;
            border: none;
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10001;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close:hover {
            transform: scale(1.1) rotate(90deg);
            background: #D98BFF;
            color: #fff;
        }

        @media (max-width: 768px) {
            .lightbox-img {
                max-width: 95%;
                max-height: 70vh;
            }
            .lightbox-close {
                top: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="page-bg-container">
        <div class="page-bg"></div>
        <div class="stars-overlay" id="stars-container"></div>
    </div>

    <app-header></app-header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="detail-content">
        <div class="detail-container">

            <!-- Left visually (Text List) -->
            <div class="right-side">
                <ul class="film-menu-list">
                    <li class="film-menu-item disabled" id="nav-watch" title="قريباً">
                        <div class="diamond-bullet"></div>
                        <span class="film-menu-text">مشاهدة الفيلم</span>
                    </li>
                    <li class="film-menu-item" id="nav-trailer">
                        <div class="diamond-bullet"></div>
                        <span class="film-menu-text">التريلر</span>
                    </li>
                    <li class="film-menu-item" id="nav-storyboard">
                        <div class="diamond-bullet"></div>
                        <span class="film-menu-text">ستوري بورد</span>
                    </li>
                    <li class="film-menu-item" id="nav-characters">
                        <div class=" diamond-bullet">
                        </div>
                        <span class="film-menu-text">الشخصيات</span>
                    </li>
                </ul>
            </div>

            <!-- Right visually (Card) -->
            <!-- Because layout is RTL, flex standard direction puts first element on the right. 
                 By screenshot:
                 [Menu List]   ...   [Square Card w/ Title] -->
            <div class="left-side">
                <div class="film-card" id="dynamic-poster" style="background-size: cover; background-position: center; cursor: zoom-in;" title="اضغط لتكبير الصورة">
                    <div class="play-icon"></div>
                </div>
                <h2 class="film-title" id="dynamic-title">...</h2>
            </div>

        </div>
    </main>

    <!-- LIGHTBOX -->
    <div class="lightbox-modal" id="lightbox-modal">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <img src="" class="lightbox-img" id="lightbox-img" alt="Film Poster" />
    </div>

    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // ===== LOAD DYNAMIC MOVIE DATA =====
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            if(!movieId) {
                // If no ID is provided, you could redirect or show an error
                // window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch(`/api/movies/${movieId}`);
                if(!res.ok) throw new Error();
                const movie = await res.json();
                
                document.getElementById('dynamic-title').textContent = movie.title;
                document.title = movie.title + ' — فيلم — نيزك';
                
                if(movie.thumbnail) {
                    document.getElementById('dynamic-poster').style.backgroundImage = `url('${movie.thumbnail}')`;
                }

                // Setup Navigation Links
                document.getElementById('nav-trailer').onclick    = () => window.location.href = `film-trailer.html?id=${movieId}`;
                document.getElementById('nav-storyboard').onclick = () => window.location.href = `film-storyboard.html?id=${movieId}`;
                document.getElementById('nav-characters').onclick = () => window.location.href = `characters.html?id=${movieId}`;
                
                // Lightbox Logic
                const lbModal = document.getElementById('lightbox-modal');
                const lbImg = document.getElementById('lightbox-img');
                const lbClose = document.getElementById('lightbox-close');
                const poster = document.getElementById('dynamic-poster');

                poster.onclick = () => {
                    const bgUrl = poster.style.backgroundImage;
                    const url = bgUrl.replace(/^url\(["']?/, '').replace(/["']?\)$/, '');
                    lbImg.src = url;
                    lbModal.classList.add('active');
                };

                lbClose.onclick = () => lbModal.classList.remove('active');
                lbModal.onclick = (e) => {
                    if (e.target === lbModal) lbModal.classList.remove('active');
                };
                
            } catch (err) {
                console.error('Error loading movie:', err);
            }
        });

        // ===== STAR PARTICLES =====
        const starsLayer = document.getElementById('stars-container');
        for (let i = 0; i < 110; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = 1 + Math.random() * 2.4;
            s.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                --dur: ${2 + Math.random() * 5}s;
                --op: ${0.18 + Math.random() * 0.65};
                opacity: var(--op);
                animation-delay: ${Math.random() * 5}s;
            `;
            starsLayer.appendChild(s);
        }
    </script>
</body>

</html>
