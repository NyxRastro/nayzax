<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اشترك — نيزك</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <style>
        body {
            overflow: hidden;
            margin: 0;
            background-color: #0F0823;
            font-family: 'Cairo', sans-serif;
        }

        /* Background */
        .subscribe-bg {
            position: absolute;
            inset: 0;
            background-image: url('images/space_bg.jpg');
            background-size: cover;
            background-position: center bottom;
            transform: scaleX(-1);
            z-index: 0;
        }

        .subscribe-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(15, 8, 35, 0.85) 0%,
                    rgba(20, 10, 50, 0.6) 60%,
                    rgba(15, 8, 35, 0.9) 100%);
        }

        /* Main Content (Moved Slightly Up) */
        .subscribe-content {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 140px;
            /* Adjust this value to move form higher/lower */
        }

        /* Form Container */
        .form-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .subscribe-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #773071;
            margin-bottom: 20px;
        }

        /* Form Fields */
        .form-group {
            width: 100%;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .field-label {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
        }

        .flat-input {
            width: 100%;
            height: 46px;
            background: #ffffff;
            border: none;
            outline: none;
            padding: 0 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            color: #333;
            text-align: right;
        }

        .flat-input::placeholder {
            color: transparent;
        }

        /* Button */
        .btn-gradient {
            background: linear-gradient(135deg, #b36ff3, #622971);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 12px 40px;
            cursor: pointer;
            margin-top: 16px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 4px 24px rgba(168, 85, 247, 0.45);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.7);
        }

        /* Simple Back Arrow */
        .simple-back-arrow {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 20;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        .simple-back-arrow:hover {
            color: #fff;
            transform: translateX(-4px) scale(1.05); /* slightly left and larger */
            filter: drop-shadow(0 0 10px rgba(192, 132, 252, 0.6));
        }
        .simple-back-arrow svg {
            width: 32px;
            height: 32px;
        }

        /* Footer */
        .footer-nav {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px;
            z-index: 10;
        }

        .footer-nav a {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.25s ease;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .footer-nav a:hover {
            color: #C084FC;
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            opacity: var(--op, 0.7);
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: var(--op, 0.7);
            }

            50% {
                opacity: 0.15;
            }
        }

        @media (max-width: 600px) {
            .subscribe-title {
                font-size: 1.3rem;
                margin-bottom: 15px;
            }
            .field-label {
                font-size: 0.9rem;
            }
            .flat-input {
                height: 38px;
                font-size: 0.85rem;
            }
            .btn-gradient {
                font-size: 0.9rem;
                padding: 8px 28px;
            }
            .footer-nav {
                gap: 20px;
                flex-wrap: wrap;
                bottom: 15px;
            }
            .footer-nav a {
                font-size: 0.85rem;
            }
            .subscribe-content {
                padding-top: 90px;
            }
            .simple-back-arrow {
                top: 25px;
                left: 25px;
            }
            .simple-back-arrow svg {
                width: 28px;
                height: 28px;
            }
            .form-container {
                max-width: 280px;
            }
        }

        /* ===== GLOBAL NAYZAK (SHOOTING STAR) ===== */
        .shooting-star-global {
            position: absolute;
            width: 240px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 1) 0%, rgba(192, 132, 252, 0.7) 25%, transparent 100%);
            border-radius: 50%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            animation: shootingGlobal var(--shot-dur, 8s) ease-in infinite;
            animation-delay: var(--delay, 0s);
        }

        .shooting-star-global::before {
            content: ' ';
            position: absolute;
            top: 50%;
            left: -4px;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 4px rgba(255,255,255,0.9), 0 0 24px 8px #C084FC, 0 0 35px 12px #7B4DFF;
        }

        @keyframes shootingGlobal {
            0% { transform: rotate(-35deg) translateX(40vw) scale(var(--scale, 1)); opacity: 0; }
            2% { opacity: 1; }
            18% { transform: rotate(-35deg) translateX(-80vw) scale(var(--scale, 1)); opacity: 0; }
            100% { transform: rotate(-35deg) translateX(-80vw) scale(var(--scale, 1)); opacity: 0; }
        }
    </style>
</head>

<body>

    <!-- Simple Back Arrow -->
    <a href="index.html" class="simple-back-arrow" aria-label="العودة للصفحة الرئيسية">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/> <!-- Chevron Left -->
        </svg>
    </a>

    <!-- Background -->
    <div class="subscribe-bg"></div>

    <!-- Stars Layer -->
    <div id="stars-layer" style="position:absolute;inset:0;z-index:1;pointer-events:none;"></div>

    <!-- Content -->
    <div class="subscribe-content">
        <div class="form-container">
            <h1 class="subscribe-title">إبق على إطلاع</h1>

            <form style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="form-group">
                    <div class="field-label">الاسم الأول</div>
                    <input class="flat-input" type="text" required />
                </div>

                <div class="form-group">
                    <div class="field-label">الاسم الثاني</div>
                    <input class="flat-input" type="text" required />
                </div>

                <div class="form-group">
                    <div class="field-label">الإيميل</div>
                    <input class="flat-input" type="email" required dir="ltr" style="text-align: left;" />
                </div>

                <button type="submit" class="btn-gradient">إشترك</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-nav">
        <a href="about.html">عن نيزك</a>
        <a href="vision.html">الرؤية</a>
        <a href="mission.html">الرسالة</a>
        <a href="contact.html">تواصل معنا</a>
    </div>

    <script>
        const sl = document.getElementById('stars-layer');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.cssText = `
                left:${Math.random() * 100}%;
                top:${Math.random() * 100}%;
                --dur:${2 + Math.random() * 4}s;
                --op:${0.3 + Math.random() * 0.7};
                width:${1 + Math.random() * 2}px;
                height:${1 + Math.random() * 2}px;
                animation-delay:${Math.random() * 4}s;
            `;
            sl.appendChild(s);
        }

        // Shooting Stars
        function createFallingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star-global';
            
            const startX = 60 + Math.random() * 40; // Starts from right
            const startY = Math.random() * 40;     // Top half
            const duration = 6 + Math.random() * 6;
            const delay = Math.random() * 2;
            const scale = 0.4 + Math.random() * 0.8;
            
            star.style.cssText = `
                top: ${startY}%;
                left: ${startX}%;
                --shot-dur: ${duration}s;
                --delay: ${delay}s;
                --scale: ${scale};
            `;
            
            document.body.appendChild(star);
            
            // Remove after animation cycle
            setTimeout(() => {
                star.remove();
            }, (duration + delay) * 1000);
        }

        // Spawn shooting stars
        setInterval(createFallingStar, 4000);
        createFallingStar(); // Initial star
    </script>

<script src="js/header.js"></script>
</body>

</html>
